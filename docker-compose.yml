version: "3.9"

services:
  # ----------------------------
  # MAIN API APP
  # ----------------------------
  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile

    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${HOST_PORT:-9090}:${CONTAINER_PORT:-9090}"

    env_file:
      - .env

    environment:
      APP_ENV: ${APP_ENV}

      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_CLUSTER: ${DB_CLUSTER}
      DB_NAME: ${DB_NAME}

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0

      APP_LOG_DIR: /app/storage/logs
      PORT: ${CONTAINER_PORT:-9091}

      # OLLAMA_HOST: ${OLLAMA_HOST}

    depends_on:
      redis:
        condition: service_healthy

    command: >
      sh -c "
      gunicorn wsgi:application
      -b 0.0.0.0:${CONTAINER_PORT:-9091}
      --workers ${GUNICORN_WORKERS:-4}
      --timeout ${GUNICORN_TIMEOUT:-120}
      --log-level ${GUNICORN_LOG_LEVEL:-info}
      --access-logfile -
      --error-logfile -
      --forwarded-allow-ips='*'
      "

    volumes:
      - ./storage/logs:/app/storage/logs

    restart: always


  # ----------------------------
  # RQ WORKER
  # ----------------------------
  worker:
    build:
      context: .
      dockerfile: docker/app.Dockerfile

    env_file:
      - .env

    environment:
      APP_ENV: ${APP_ENV}

      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_CLUSTER: ${DB_CLUSTER}
      DB_NAME: ${DB_NAME}

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0

      APP_LOG_DIR: /app/storage/logs

      # OLLAMA_HOST: ${OLLAMA_HOST}

    depends_on:
      redis:
        condition: service_healthy

    command: >
      sh -c "rq worker ${RQ_QUEUE:-publish} --url redis://redis:6379/0"

    volumes:
      - ./storage/logs:/app/storage/logs

    restart: always


  # ----------------------------
  # RQ SCHEDULER
  # ----------------------------
  scheduler:
    build:
      context: .
      dockerfile: docker/app.Dockerfile

    env_file:
      - .env

    environment:
      APP_ENV: ${APP_ENV}
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_LOG_DIR: /app/storage/logs

      # OLLAMA_HOST: ${OLLAMA_HOST}

    depends_on:
      redis:
        condition: service_healthy

    command: >
      sh -c "rqscheduler --url redis://redis:6379/0"

    restart: always


  # ----------------------------
  # REDIS
  # ----------------------------
  redis:
    image: redis:alpine

    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf

    command: redis-server /usr/local/etc/redis/redis.conf

    restart: always

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30


